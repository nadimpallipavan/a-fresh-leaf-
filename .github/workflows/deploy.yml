name: Deploy AFL Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install FTP client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload build to AFL staging
        env:
          FTP_HOST: ${{ secrets.AFL_FTP_HOST }}
          FTP_USER: ${{ secrets.AFL_FTP_USER }}
          FTP_PASS: ${{ secrets.AFL_FTP_PASS }}
          FTP_REMOTE_DIR: ${{ secrets.AFL_FTP_REMOTE_DIR }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          mirror -R --delete --verbose ./dist/ "$FTP_REMOTE_DIR"
          bye
          EOF
