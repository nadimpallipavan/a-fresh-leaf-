name: Deploy to FTP Staging

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 🚀 Sync Files to FTP Staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.AFL_FTP_HOST }}
          username: ${{ secrets.AFL_FTP_USER }}
          password: ${{ secrets.AFL_FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.AFL_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
